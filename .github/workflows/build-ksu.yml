name: Build MT6739 Kernel with KernelSU

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: kernel-su-susfs
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bison build-essential bc flex libncurses5-dev libssl-dev \
            python3-lib2to3 python-is-python3

      - name: Setup toolchain
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 \
            /opt/toolchain
          echo "/opt/toolchain/bin" >> $GITHUB_PATH
          echo "CROSS_COMPILE=aarch64-linux-android-" >> $GITHUB_ENV

      - name: Clone KernelSU
        run: |
          git clone --depth=1 https://github.com/tiann/KernelSU.git /tmp/KernelSU

      - name: Integrate KernelSU into kernel source
        run: |
          mkdir -p drivers/kernelsu/
          cp -r /tmp/KernelSU/kernel/* drivers/kernelsu/
          sed -i '/^obj-\$(CONFIG_)/a obj-\$(CONFIG_KSU) += kernelsu/' drivers/Makefile
          sed -i '/endmenu/i\source "drivers/kernelsu/Kconfig"' drivers/Kconfig

      - name: Fix Python 2 code
        run: |
          python3 -m lib2to3 -w tools/dct/DrvGen.py 2>&1 || true
          python3 -m lib2to3 -w tools/dct/obj/*.py 2>&1 || true
          sed -i 's|/usr/bin/python|/usr/bin/python3|' tools/dct/DrvGen.py
          sed -i 's/^import ConfigParser$/import configparser/' tools/dct/obj/*.py
          sed -i 's/\bConfigParser\./configparser./g' tools/dct/obj/*.py
          sed -i 's/string\.atoi/int/g' tools/dct/obj/*.py

      - name: Configure kernel
        run: |
          make ARCH=arm64 O=../out dura64_defconfig
          make ARCH=arm64 O=../out olddefconfig

      - name: Build kernel
        id: build
        continue-on-error: true
        env:
          HOST_EXTRACFLAGS: "-I${{ github.workspace }}/security/selinux/include"
        run: |
          export PYTHONPATH=$(pwd)/tools/dct/obj:$PYTHONPATH
          make ARCH=arm64 O=../out -j$(nproc) -k Image.gz-dtb 2>&1 | tee /tmp/build.log
          if [ -f ../out/arch/arm64/boot/Image.gz-dtb ]; then
            ls -lh ../out/arch/arm64/boot/Image.gz-dtb
            echo "BUILD_OK=true" >> $GITHUB_OUTPUT
          else
            echo "BUILD_OK=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Image.gz-dtb
        if: steps.build.outputs.BUILD_OK == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-Image.gz-dtb-ksu
          path: ../out/arch/arm64/boot/Image.gz-dtb
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-ksu
          path: /tmp/build.log
          retention-days: 30


