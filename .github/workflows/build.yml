name: Build MT6739 Kernel

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bison build-essential bc flex libncurses5-dev libssl-dev python3-lib2to3

      - name: Setup toolchain
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 \
            /opt/toolchain
          echo "/opt/toolchain/bin" >> $GITHUB_PATH
          echo "CROSS_COMPILE=aarch64-linux-android-" >> $GITHUB_ENV

      - name: Fix DrvGen.py
        run: |
          python3 -m lib2to3 -w tools/dct/DrvGen.py > /dev/null 2>&1 || true
          sed -i 's|/usr/bin/python2|/usr/bin/python3|' tools/dct/DrvGen.py
          chmod +x tools/dct/DrvGen.py

      - name: Configure kernel
        run: |
          make ARCH=arm64 O=../out dura64_defconfig
          make ARCH=arm64 O=../out olddefconfig

      - name: Build kernel
        id: build
        continue-on-error: true
        run: |
          make ARCH=arm64 O=../out -j$(nproc) -k Image.gz-dtb 2>&1 | tee /tmp/build.log
          if [ -f ../out/arch/arm64/boot/Image.gz-dtb ]; then
            echo "BUILD_OK=true" >> $GITHUB_OUTPUT
          else
            echo "BUILD_OK=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Image.gz-dtb
        if: steps.build.outputs.BUILD_OK == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-Image.gz-dtb
          path: ../out/arch/arm64/boot/Image.gz-dtb
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 30
