name: Build MT6739 Kernel

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  import-source:
    runs-on: ubuntu-latest
    outputs:
      imported: ${{ steps.check.outputs.imported }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if source already imported
        id: check
        run: |
          if [ -f Makefile ]; then
            echo "imported=true" >> $GITHUB_OUTPUT
          else
            echo "imported=false" >> $GITHUB_OUTPUT
          fi

      - name: Import kernel source from release
        if: steps.check.outputs.imported == 'false'
        run: |
          gh release download v1.0.0 \
            --repo hbs990n/android-kernel \
            --pattern "*.tar.gz" \
            --dir /tmp
          tar xzf /tmp/kernel-4.4-mt6739.tar.gz -C $GITHUB_WORKSPACE
          cd $GITHUB_WORKSPACE
          # Fix DrvGen.py for Python 3 with 2to3
          sudo apt-get install -y -qq python3-lib2to3
          2to3-3.12 -w tools/dct/DrvGen.py > /dev/null 2>&1
          # Also fix the shebang line
          sed -i 's|#!/usr/bin/python2|#!/usr/bin/python3|' tools/dct/DrvGen.py
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Import kernel source"
          git push
        env:
          GH_TOKEN: ${{ github.token }}

  build-kernel:
    needs: import-source
    if: always() && needs.import-source.outputs.imported == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download toolchain
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 \
            /opt/toolchain
          echo "PATH=/opt/toolchain/bin:$PATH" >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-android-" >> $GITHUB_ENV

      - name: Configure kernel
        run: |
          make ARCH=arm64 dura64_defconfig
          cat arch/arm64/configs/dura64_board_AL00A_defconfig >> .config
          make ARCH=arm64 olddefconfig
          echo "CONFIG_SECURITY_SELINUX_BOOTPARAM_VALUE=0" >> .config
          make ARCH=arm64 olddefconfig
          grep SELINUX_BOOTPARAM .config

      - name: Build kernel
        run: |
          chmod +x tools/dct/DrvGen.py scripts/drvgen/*
          make ARCH=arm64 -j$(nproc) Image.gz-dtb 2>&1 | tail -50

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: kernel-Image.gz-dtb
          path: arch/arm64/boot/Image.gz-dtb
