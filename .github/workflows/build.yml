name: Build MT6739 Kernel

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: System info
        run: |
          echo "=== OS ==="
          cat /etc/os-release
          echo ""
          echo "=== Kernel ==="
          uname -a
          echo ""
          echo "=== GCC ==="
          gcc --version 2>&1 || echo "gcc: NOT FOUND"
          echo ""
          echo "=== Python ==="
          python --version 2>&1 || echo "python: NOT FOUND"
          python2 --version 2>&1 || echo "python2: NOT FOUND"
          python3 --version 2>&1 || echo "python3: NOT FOUND"
          echo ""
          echo "=== binutils ld ==="
          ld --version 2>&1 | head -1 || echo "ld: NOT FOUND"
          echo ""
          echo "=== Make ==="
          make --version 2>&1 | head -1 || echo "make: NOT FOUND"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bison build-essential bc flex libncurses5-dev libssl-dev \
            python3-lib2to3 python-is-python3
          echo ""
          echo "=== After install: python ==="
          python --version 2>&1 || echo "python: STILL NOT FOUND"
          echo ""
          echo "=== GCC ==="
          gcc --version 2>&1 | head -1
          echo ""
          echo "=== ld ==="
          ld --version 2>&1 | head -1

      - name: Setup toolchain
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 \
            /opt/toolchain 2>&1
          echo ""
          echo "=== Toolchain ==="
          /opt/toolchain/bin/aarch64-linux-android-gcc --version 2>&1 | head -1 || echo "aarch64-linux-android-gcc: NOT FOUND"
          file /opt/toolchain/bin/aarch64-linux-android-gcc 2>&1 || true
          echo "/opt/toolchain/bin" >> $GITHUB_PATH
          echo "CROSS_COMPILE=aarch64-linux-android-" >> $GITHUB_ENV

      - name: Fix DrvGen.py
        run: |
          echo "=== Before fix ==="
          head -1 tools/dct/DrvGen.py
          echo ""
          echo "=== Converting to Python 3 ==="
          python3 -m lib2to3 -w tools/dct/DrvGen.py 2>&1 | tail -5 || true
          sed -i 's|/usr/bin/python|/usr/bin/python3|' tools/dct/DrvGen.py
          chmod +x tools/dct/DrvGen.py
          echo ""
          echo "=== After fix ==="
          head -1 tools/dct/DrvGen.py

      - name: Configure kernel
        run: |
          echo "=== defconfig ==="
          make ARCH=arm64 O=../out dura64_defconfig 2>&1 | tail -5
          echo ""
          make ARCH=arm64 O=../out olddefconfig 2>&1 | tail -5
          echo ""
          echo "=== SELinux config ==="
          grep SELINUX_BOOTPARAM ../out/.config || echo "SELINUX_BOOTPARAM not set"

      - name: Build kernel
        id: build
        continue-on-error: true
        run: |
          echo "=== Build start ==="
          make HOSTCFLAGS="-fno-common" ARCH=arm64 O=../out -j$(nproc) -k Image.gz-dtb 2>&1 | tee /tmp/build.log
          echo ""
          echo "=== Build result ==="
          if [ -f ../out/arch/arm64/boot/Image.gz-dtb ]; then
            ls -lh ../out/arch/arm64/boot/Image.gz-dtb
            echo "BUILD_OK=true" >> $GITHUB_OUTPUT
          else
            echo "Image.gz-dtb: NOT FOUND"
            echo "BUILD_OK=false" >> $GITHUB_OUTPUT
            echo ""
            echo "=== Last 30 lines of build log ==="
            tail -30 /tmp/build.log
          fi

      - name: Error analysis
        if: steps.build.outputs.BUILD_OK == 'false'
        run: |
          echo "=== ERROR SUMMARY ==="
          grep -n "error:" /tmp/build.log | grep -v "warning:" | head -40 || echo "No errors found"
          echo ""
          echo "=== MODULE NOT FOUND ERRORS ==="
          grep -i "ModuleNotFoundError\|No module named\|ImportError" /tmp/build.log | head -10 || echo "None"
          echo ""
          echo "=== COMPILER/LINKER ERRORS ==="
          grep -E "(collect2:|multiple definition|cannot find|command not found)" /tmp/build.log | head -10 || echo "None"
          echo ""
          echo "=== WARNINGS ==="
          grep -c "warning:" /tmp/build.log || echo "0"
          echo ""
          echo "=== ERRORS COUNT ==="
          grep -c "error:" /tmp/build.log || echo "0"

      - name: Upload Image.gz-dtb
        if: steps.build.outputs.BUILD_OK == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-Image.gz-dtb
          path: ../out/arch/arm64/boot/Image.gz-dtb
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 30
