name: Build MT6739 Kernel

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bison build-essential bc flex libncurses5-dev libssl-dev \
            python-is-python3

      - name: Setup toolchain
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 \
            /opt/toolchain
          echo "/opt/toolchain/bin" >> $GITHUB_PATH
          echo "CROSS_COMPILE=aarch64-linux-android-" >> $GITHUB_ENV

      - name: Fix scripts executable and dtc yylloc
        run: |
          find . -type f -exec grep -l '^#!/' {} \; 2>/dev/null | xargs -r chmod +x
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.lex.c_shipped

      - name: Configure kernel
        run: |
          make ARCH=arm64 O=../out dura64_defconfig
          make ARCH=arm64 O=../out olddefconfig

      - name: Build kernel
        id: build
        continue-on-error: true
        run: |
          export PYTHONPATH=$(pwd)/tools/dct/obj:$PYTHONPATH
          make ARCH=arm64 O=../out -j$(nproc) -k Image.gz-dtb 2>&1 | tee /tmp/build.log
          if [ -f ../out/arch/arm64/boot/Image.gz-dtb ]; then
            ls -lh ../out/arch/arm64/boot/Image.gz-dtb
            echo "BUILD_OK=true" >> $GITHUB_OUTPUT
          else
            echo "BUILD_OK=false" >> $GITHUB_OUTPUT
          fi

      - name: Error analysis
        if: steps.build.outputs.BUILD_OK == 'false'
        run: |
          echo "=== ERRORS ==="
          grep -n "error:" /tmp/build.log | grep -v "warning:" | head -30
          echo ""
          echo "=== MODULE/MISSING ==="
          grep -i "ModuleNotFoundError\|No module named\|ImportError\|fatal error" /tmp/build.log | head -10 || echo "None"
          echo ""
          echo "=== LINKER ERRORS ==="
          grep -E "collect2:|multiple definition|cannot find" /tmp/build.log | head -10 || echo "None"

      - name: Upload Image.gz-dtb
        if: steps.build.outputs.BUILD_OK == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-Image.gz-dtb
          path: ../out/arch/arm64/boot/Image.gz-dtb
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 30